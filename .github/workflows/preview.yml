name: PR Preview
on:
  pull_request:
    types: [opened, synchronize, closed]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set app name
        id: names
        run: |
          echo "app=linkgnome-pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
          echo "url=https://linkgnome-pr-${{ github.event.number }}.fly.dev" >> $GITHUB_OUTPUT
          echo "volume=litefs_data_pr_${{ github.event.number }}" >> $GITHUB_OUTPUT

      - name: Patch fly.toml for PR preview
        if: github.event.action != 'closed'
        run: |
          sed -i "s/source = 'litefs_data'/source = '${{ steps.names.outputs.volume }}'/" web/fly.toml
          echo "Patched fly.toml mount source to ${{ steps.names.outputs.volume }}"

      - name: Destroy preview (PR closed)
        if: github.event.action == 'closed'
        run: |
          VOLUMES=$(fly volumes list --app "${{ steps.names.outputs.app }}" --json 2>/dev/null | python3 -c "import sys,json; [print(v['id']) for v in json.load(sys.stdin)]" 2>/dev/null || true)
          for VOL_ID in $VOLUMES; do
            fly volumes delete "$VOL_ID" --yes 2>/dev/null || true
          done
          fly apps destroy "${{ steps.names.outputs.app }}" --yes 2>/dev/null || true

      - name: Create app
        if: github.event.action != 'closed'
        run: |
          fly apps create "${{ steps.names.outputs.app }}" --org personal 2>/dev/null || true

      - name: Create LiteFS volume
        if: github.event.action != 'closed'
        run: |
          EXISTING=$(fly volumes list --app "${{ steps.names.outputs.app }}" --json 2>/dev/null | python3 -c "import sys,json; vols=json.load(sys.stdin); print('yes') if vols else print('no')" 2>/dev/null || echo "no")
          if [ "$EXISTING" = "no" ]; then
            fly volumes create "${{ steps.names.outputs.volume }}" \
              --app "${{ steps.names.outputs.app }}" \
              --size 1 \
              --region iad
          fi

      - name: Set secrets
        if: github.event.action != 'closed'
        run: |
          fly secrets set \
            --app "${{ steps.names.outputs.app }}" \
            DJANGO_SECRET_KEY="$(openssl rand -hex 32)" \
            DJANGO_DEBUG="True" \
            ALLOWED_HOSTS="*" \
            CSRF_TRUSTED_ORIGINS="${{ steps.names.outputs.url }}" \
            DATA_DIR="/data"

      - name: Deploy
        if: github.event.action != 'closed'
        run: |
          fly deploy \
            --app "${{ steps.names.outputs.app }}" \
            --config web/fly.toml \
            --strategy immediate

      - name: Comment PR
        if: github.event.action != 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.names.outputs.url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed: [${url}](${url})`
            });
