name: CI
on: [push, pull_request]

jobs:
  test-lib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatchling pytest pytest-asyncio httpx respx
      - run: pip install -e .
      - run: pytest tests/

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatchling pytest httpx respx
      - run: pip install -e .
      - run: pip install -e web/
      - run: cd web && python manage.py collectstatic --noinput
      - run: cd web && python -c "import django; django.setup(); from django.conf import settings; print('Web config OK')"
