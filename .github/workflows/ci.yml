name: CI
on: [push, pull_request]

jobs:
  test-lib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatchling pytest pytest-asyncio httpx respx
      - run: pip install -e .
      - run: pytest tests/

  test-web:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: test-key-for-ci
      DJANGO_DEBUG: "False"
      DATA_DIR: /tmp/linkgnome-test-data
      LINKGNOME_CACHE_PATH: /tmp/linkgnome-test-cache.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatchling pytest pytest-django pytest-asyncio httpx respx
      - run: pip install -e .
      - run: pip install -e web/
      - run: cd web && python manage.py migrate --noinput
      - run: cd web && DJANGO_SETTINGS_MODULE=config.settings pytest tests/ -v --tb=short --no-header
