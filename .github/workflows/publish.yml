name: Publish to PyPI
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "CHANGELOG.md"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatchling pytest pytest-asyncio httpx respx
      - run: pip install -e .
      - run: pytest tests/
      - name: Extract version
        id: version
        run: |
          VERSION=$(python -c "import sys; sys.path.insert(0, 'src'); from linkgnome import __version__; print(__version__)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
      - name: Check if version already published
        id: check
        run: |
          if pip index versions linkgnome 2>/dev/null | grep -q "${{ steps.version.outputs.version }}"; then
            echo "publish=false" >> $GITHUB_OUTPUT
          else
            echo "publish=true" >> $GITHUB_OUTPUT
          fi
      - name: Build package
        if: steps.check.outputs.publish == 'true'
        run: python -m hatchling build
      - name: Publish to PyPI
        if: steps.check.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub Release
        if: steps.check.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: CHANGELOG.md
          generate_release_notes: true
