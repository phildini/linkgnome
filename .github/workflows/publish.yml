name: Publish to PyPI
on:
  push:
    branches: [main]
    paths:
      - "src/linkgnome/**"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatchling pytest pytest-asyncio httpx respx
      - run: pip install -e .
      - run: pytest tests/
      - run: python -m hatchling build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
