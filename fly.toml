app = 'linkgnome'
primary_region = 'ord'

[build]
  dockerfile = 'web/Dockerfile'

[env]
  ALLOWED_HOSTS = '*'
  CSRF_TRUSTED_ORIGINS = 'https://linkgnome.fly.dev'
  DATA_DIR = '/data'
  DJANGO_DEBUG = 'False'
  DJANGO_SECRET_KEY = 'change-me-in-production'

[secrets]
  DATABASE_URL = 'postgres://user:password@host:5432/dbname'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
