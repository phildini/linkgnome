app = 'linkgnome'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'immediate'

[env]
  ALLOWED_HOSTS = '*'
  CSRF_TRUSTED_ORIGINS = 'https://linkgnome.fly.dev'
  DATA_DIR = '/data'
  DJANGO_DEBUG = 'False'
  DJANGO_SECRET_KEY = 'change-me-in-production'

[processes]
  web = ''
  worker = 'python manage.py qcluster'

[[mounts]]
  source = 'litefs_data'
  destination = '/var/lib/litefs'

[[services]]
  internal_port = 8081
  processes = ['web']

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 10

  [[services.http_checks]]
    grace_period = '60s'
    interval = '30s'
    timeout = '10s'
    method = 'GET'
    path = '/health/'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
