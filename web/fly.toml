# fly.toml app configuration file generated for linkgnome on 2026-06-01T04:07:55+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'linkgnome'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[processes]
  web = 'gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 1 --threads 4 --access-logfile -'
  worker = 'python manage.py qcluster'

[env]
  ALLOWED_HOSTS = 'linkgnome.fly.dev,localhost'
  CSRF_TRUSTED_ORIGINS = 'https://linkgnome.fly.dev'
  DATA_DIR = '/data'
  DJANGO_DEBUG = 'False'
  DJANGO_SECRET_KEY = 'change-me-in-production'

[[mounts]]
  source = 'linkgnome_data'
  destination = '/data'

[[services]]
  protocol = ''
  internal_port = 8000
  processes = ['web']

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 10

  [[services.http_checks]]
    interval = '30s'
    timeout = '5s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
