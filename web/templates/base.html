{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="lemonade">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LinkGnome{% endblock %}</title>
  <link href="{% static 'css/output.css' %}" rel="stylesheet" />
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script>
    document.addEventListener('htmx:configRequest', (e) => {
      e.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
    });
  </script>
</head>
<body class="min-h-screen bg-base-300">
  <div class="navbar bg-base-100 shadow-sm mb-6">
    <div class="flex-1">
      <a href="{% url 'feeds:dashboard' %}" class="btn btn-ghost text-xl">LinkGnome</a>
    </div>
    <div class="flex-none gap-2">
      {% if user.is_authenticated %}
        <a href="{% url 'accounts:settings' %}" class="btn btn-ghost btn-sm">Settings</a>
        <form method="post" action="{% url 'accounts:logout' %}">
          {% csrf_token %}
          <button class="btn btn-ghost btn-sm">Log Out</button>
        </form>
      {% else %}
        <a href="{% url 'accounts:login' %}" class="btn btn-ghost btn-sm">Log In</a>
        <a href="{% url 'accounts:signup' %}" class="btn btn-primary btn-sm">Sign Up</a>
      {% endif %}
    </div>
  </div>

  <main class="container mx-auto px-4 pb-12">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
