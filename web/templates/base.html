{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="gnome">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LinkGnome{% endblock %}</title>
  <link href="{% static 'css/output.css' %}" rel="stylesheet" />
  <link rel="icon" type="image/png" href="{% static 'img/linkgnome.png' %}" />
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script>
    document.addEventListener('htmx:configRequest', (e) => {
      e.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
    });
    document.addEventListener('htmx:afterSwap', (e) => {
      if (e.target.id === 'feed-table') {
        const firstCard = e.target.querySelector('[tabindex="-1"]');
        if (firstCard) firstCard.focus();
      }
    });
  </script>
</head>
<body class="min-h-screen">
  <a href="#main-content" class="skip-link">Skip to content</a>

  <nav class="gnome-nav" aria-label="Main navigation">
    <div class="container mx-auto px-4">
      <div class="flex items-center justify-between h-14">
        <a href="{% url 'feeds:dashboard' %}" class="flex items-center gap-2 no-underline hover:opacity-80 transition-opacity">
          <img src="{% static 'img/linkgnome.png' %}" alt="LinkGnome" class="h-8 w-auto" />
          <span class="text-lg font-bold text-base-content">LinkGnome</span>
        </a>
        <div class="flex items-center gap-1">
          {% if user.is_authenticated %}
            <a href="{% url 'accounts:settings' %}" class="btn btn-ghost btn-xs" aria-label="Account settings">Settings</a>
            <form method="post" action="{% url 'accounts:logout' %}" class="inline-flex">
              {% csrf_token %}
              <button class="btn btn-ghost btn-xs" aria-label="Log out">Log Out</button>
            </form>
          {% else %}
            <a href="{% url 'accounts:login' %}" class="btn btn-ghost btn-xs">Log In</a>
            <a href="{% url 'accounts:signup' %}" class="btn btn-primary btn-xs">Sign Up</a>
          {% endif %}
        </div>
      </div>
    </div>
  </nav>

  <main id="main-content" class="container mx-auto px-4 pb-12 pt-6" tabindex="-1">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
