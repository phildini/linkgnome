{% extends "base.html" %}
{% block title %}Verification Failed — LinkGnome{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body text-center">
      <div class="text-6xl mb-4">⏰</div>
      <h2 class="card-title text-2xl font-bold mb-4 justify-center">Link Expired or Invalid</h2>
      <p>This verification link is invalid or has expired (links are valid for 24 hours).</p>
      <a href="{% url 'accounts:signup' %}" class="btn btn-primary mt-6">Sign Up Again</a>
    </div>
  </div>
</div>
{% endblock %}
