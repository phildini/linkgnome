{% extends "base.html" %}
{% block title %}Log In — LinkGnome{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body">
      <h2 class="card-title text-2xl font-bold mb-4">Log In</h2>
      <form method="post" class="space-y-4">
        {% csrf_token %}
        {% if form.non_field_errors %}
          <div class="alert alert-error">{{ form.non_field_errors }}</div>
        {% endif %}
        {% for field in form %}
          <div>
            <label class="label" for="{{ field.id_for_label }}">
              <span class="label-text">{{ field.label }}</span>
            </label>
            {{ field }}
          </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary w-full">Log In</button>
      </form>
      <p class="text-center text-sm mt-4">
        Don't have an account?
        <a href="{% url 'accounts:signup' %}" class="link link-primary">Sign up</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
