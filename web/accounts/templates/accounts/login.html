{% extends "base.html" %}
{% block title %}Log In — LinkGnome{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body">
      <h2 class="card-title text-2xl font-bold mb-4">Log In</h2>
      <form method="post" action="{% url 'accounts:send_link' %}{% if request.GET.next %}?next={{ request.GET.next|urlencode }}{% endif %}" class="space-y-4">
        {% csrf_token %}
        {% if messages %}
          {% for message in messages %}
            <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-info{% endif %}">{{ message }}</div>
          {% endfor %}
        {% endif %}
        <div>
          <label class="label" for="id_contact">
            <span class="label-text">Email address</span>
          </label>
          <input type="email" name="contact" id="id_contact" class="input input-bordered w-full" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <button type="submit" class="btn btn-primary w-full">Send Login Link</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
