{% extends "base.html" %}
{% block title %}Connection Failed — LinkGnome{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body text-center">
      <div class="text-6xl mb-4">❌</div>
      <h2 class="card-title text-2xl font-bold mb-4 justify-center">Connection Failed</h2>
      <p>Could not connect to {{ platform }}.</p>
      {% if error %}
        <p class="text-sm text-error mt-2">{{ error }}</p>
      {% endif %}
      <a href="{% url 'accounts:settings' %}" class="btn btn-primary mt-6">Back to Settings</a>
    </div>
  </div>
</div>
{% endblock %}
