{% extends "base.html" %}
{% block title %}Plan Limit — LinkGnome{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body text-center">
      <div class="text-5xl mb-4">🌱</div>
      <h2 class="card-title text-2xl font-bold mb-2 justify-center">Upgrade to {{ plan }}</h2>
      <p class="text-base-content/60">You've reached the limit of {{ platform }} accounts on your current plan.</p>
      <p class="text-sm text-base-content/60 mt-1">The Gnome plan is $5/month or $25/year for unlimited accounts.</p>
      <a href="{% url 'accounts:settings' %}" class="btn btn-primary mt-6">Back to Settings</a>
    </div>
  </div>
</div>
{% endblock %}
