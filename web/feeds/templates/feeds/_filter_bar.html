{% load static %}
<div id="filter-bar" class="join" role="group" aria-label="Filter by platform"{% if add_oob %} hx-swap-oob="true"{% endif %}>
  <a href="{% url 'feeds:dashboard' %}?platform=all&range={{ current_range }}"
     class="btn btn-xs join-item gnome-btn-filter {% if current_platform == 'all' %}btn-active{% endif %}"
     hx-get="{% url 'feeds:feed_table' %}?platform=all&range={{ current_range }}"
     hx-target="#feed-content"
     hx-swap="outerHTML"
     hx-push-url="{% url 'feeds:dashboard' %}?platform=all&range={{ current_range }}"
     aria-label="Show all links">All</a>
  <a href="{% url 'feeds:dashboard' %}?platform=mastodon&range={{ current_range }}"
     class="btn btn-xs join-item gnome-btn-filter {% if current_platform == 'mastodon' %}btn-active{% endif %}"
     hx-get="{% url 'feeds:feed_table' %}?platform=mastodon&range={{ current_range }}"
     hx-target="#feed-content"
     hx-swap="outerHTML"
     hx-push-url="{% url 'feeds:dashboard' %}?platform=mastodon&range={{ current_range }}"
     aria-label="Show only Mastodon links">M</a>
  <a href="{% url 'feeds:dashboard' %}?platform=bluesky&range={{ current_range }}"
     class="btn btn-xs join-item gnome-btn-filter {% if current_platform == 'bluesky' %}btn-active{% endif %}"
     hx-get="{% url 'feeds:feed_table' %}?platform=bluesky&range={{ current_range }}"
     hx-target="#feed-content"
     hx-swap="outerHTML"
     hx-push-url="{% url 'feeds:dashboard' %}?platform=bluesky&range={{ current_range }}"
     aria-label="Show only Bluesky links">B</a>
</div>
  <div id="time-bar" class="join" role="group" aria-label="Time range"{% if add_oob %} hx-swap-oob="true"{% endif %}>
  <a href="{% url 'feeds:dashboard' %}?range=24h&platform={{ current_platform }}"
     class="btn btn-xs join-item gnome-btn-filter {% if current_range == '24h' %}btn-active{% endif %}"
     hx-get="{% url 'feeds:feed_table' %}?range=24h&platform={{ current_platform }}"
     hx-target="#feed-content"
     hx-swap="outerHTML"
     hx-push-url="{% url 'feeds:dashboard' %}?range=24h&platform={{ current_platform }}">24h</a>
  <a href="{% url 'feeds:dashboard' %}?range=7d&platform={{ current_platform }}"
     class="btn btn-xs join-item gnome-btn-filter {% if current_range == '7d' %}btn-active{% endif %}"
     hx-get="{% url 'feeds:feed_table' %}?range=7d&platform={{ current_platform }}"
     hx-target="#feed-content"
     hx-swap="outerHTML"
     hx-push-url="{% url 'feeds:dashboard' %}?range=7d&platform={{ current_platform }}">7d</a>
  {% if user.plan == 'wizard' %}
    <a href="{% url 'feeds:dashboard' %}?range=30d&platform={{ current_platform }}"
       class="btn btn-xs join-item gnome-btn-filter {% if current_range == '30d' %}btn-active{% endif %}"
       hx-get="{% url 'feeds:feed_table' %}?range=30d&platform={{ current_platform }}"
       hx-target="#feed-content"
       hx-swap="outerHTML"
       hx-push-url="{% url 'feeds:dashboard' %}?range=30d&platform={{ current_platform }}">30d</a>
    <a href="{% url 'feeds:dashboard' %}?range=all&platform={{ current_platform }}"
       class="btn btn-xs join-item gnome-btn-filter {% if current_range == 'all' %}btn-active{% endif %}"
       hx-get="{% url 'feeds:feed_table' %}?range=all&platform={{ current_platform }}"
       hx-target="#feed-content"
       hx-swap="outerHTML"
       hx-push-url="{% url 'feeds:dashboard' %}?range=all&platform={{ current_platform }}">All</a>
  {% endif %}
</div>
