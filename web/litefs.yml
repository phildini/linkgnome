fuse:
  dir: "/data"

data:
  dir: "/var/lib/litefs"

exit-on-error: false

proxy:
  addr: ":8081"
  target: "localhost:8080"
  db: "linkgnome.db"
  passthrough:
    - "*.ico"
    - "*.png"

exec:
  - cmd: "/app/docker-entrypoint.sh"

lease:
  type: "consul"
  advertise-url: "http://${HOSTNAME}.vm.${FLY_APP_NAME}.internal:20202"
  candidate: ${FLY_REGION == PRIMARY_REGION}
  promote: true

  consul:
    url: "${FLY_CONSUL_URL}"
    key: "litefs/${FLY_APP_NAME}"
